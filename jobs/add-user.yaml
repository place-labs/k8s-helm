apiVersion: batch/v1
kind: Job
metadata:
  name: add-user
  namespace: placeos
spec:
  completions: 1
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  template:
    metadata:
      name: add-user
    spec:
      restartPolicy: Never
      containers:
      - name: init
        image: placeos/init:placeos-2.2602.5
        command:
          - /app/bin/task
          - create:user
        args:
          - authority_id=authority-xxx
          - email=support@place.tech
          - username=Place Support
          - password=PLACEHOLDER
          - sys_admin=true
          - support=true
        env:
        # These env vars may not be required for this task - needs testing
          - name: PLACE_AUTH_HOST
            value: "auth:3000"
          - name: PLACE_TLS
            value: "true"
        # These env vars are required
        envFrom:
          - configMapRef:
              name: postgres-client
          - secretRef:
              name: postgres-client
          - secretRef:
              name: init
